# ============================================
# DATABASE CONFIGURATION
# ============================================

# Database URL (connection string)
# jdbc:mysql://localhost:3306/taskmanager_db
# ^^^^^^ ^^^^ ^^^ ^^^^^ ^^^ ^^^^^^^^^^^^^^
# |      |    |   |     |   \u2514\u2500 Database name
# |      |    |   |     \u2514\u2500\u2500\u2500\u2500\u2500 Port (3306 is default MySQL port)
# |      |    |   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Host (localhost = your computer)
# |      |    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Protocol (mysql)
# |      \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 JDBC driver
# \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Java Database Connectivity

spring.datasource.url=jdbc:mysql://localhost:3306/taskmanager_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Database credentials (CHANGE THESE!)
spring.datasource.username=root
spring.datasource.password=AnjuAlex@123

# MySQL Driver class name
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA (Java Persistence API) CONFIGURATION
# ============================================

# ddl-auto: update = automatically create/update tables based on your Java classes
# Options: 
#   - none: don't change database
#   - update: add new tables/columns but don't delete
#   - create: delete and recreate tables on every restart
#   - create-drop: delete tables when app stops

spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true

# Format SQL queries nicely
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate we're using MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# ============================================
# SERVER CONFIGURATION
# ============================================

# Port your API will run on (default is 8080)
server.port=8080

# ============================================
# DATE/TIME CONFIGURATION
# ============================================

spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss